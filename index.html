<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Antic+Didone&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <title>PastelHood</title>
  </head>
  <body>
    <header>
      <div class="header-container">
        <h1 id="logo">
          <a href="/"><img src="./public/200.png" alt="Logo" /></a>
        </h1>
        <div class="header-navigation">
          <a href="#">Shop</a>
          <a href="#">About Us</a>
          <a href="#">Blog</a>
          <a href="#">FAQ</a>
        </div>
        <div class="header-buttons">
          <!-- search -->
          <div class="search">
            <svg
              width="24px"
              height="24px"
              viewBox="-2 -2 34 34"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
            >
              <g stroke="none" fill="currentColor" fill-rule="nonzero">
                <path
                  d="M29.6,27.4 L22.9,20.7 C24.6,18.6 25.6,15.9 25.6,13 C25.6,6.1 20,0.5 13.1,0.5 C6.2,0.5 0.5,6.1 0.5,13 C0.5,19.9 6.1,25.5 13,25.5 C15.9,25.5 18.6,24.5 20.7,22.8 L27.4,29.5 L29.6,27.4 Z M3.5,13 C3.5,7.8 7.8,3.5 13,3.5 C18.2,3.5 22.5,7.8 22.5,13 C22.5,18.2 18.2,22.5 13,22.5 C7.8,22.5 3.5,18.2 3.5,13 Z"
                ></path>
              </g>
            </svg>
          </div>
          <!-- cart -->
          <div class="cart">
            <svg
              width="24px"
              height="24px"
              viewBox="0 -2 37 35"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
            >
              <g
                transform="translate(0.500000, 0.500000)"
                stroke="none"
                fill="currentColor"
                fill-rule="nonzero"
              >
                <path
                  d="M0.2,11 L9.5,29 L26.4,29 L35.7,11 L0.2,11 Z M24.5,26 L11.5,26 L4.8,14 L31.2,14 L24.5,26 L24.5,26 Z M18.5,3 C22.7,3 25.5,6.3 25.5,8.5 L28.5,8.5 C28.5,4.5 24.2,0 18.5,0 C12.8,0 8.5,4.5 8.5,8.5 L11.5,8.5 C11.5,6.3 14.3,3 18.5,3 Z"
                ></path>
              </g>
            </svg>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section id="slideshow"></section>
      <section id="collection">
        <div>a</div>
        <div>b</div>
        <div>c</div>
      </section>
      <section id="about-us">
        <div class="about-us-container">
          <div class="about-left">
            <div class="about-left-img"></div>
          </div>
          <div class="about-right">
            <div class="about-right-img"></div>
          </div>
        </div>
      </section>
      <section id="purchase"></section>
      <section id="filler"></section>
    </main>
    <footer>© 2022 PastelHood</footer>
  </body>
</html>
